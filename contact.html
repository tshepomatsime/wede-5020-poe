    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d10778.543924668687!2d24.709131340960333!3d-27.409246181457892!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e991200966a0607%3A0xf05fea4b64e73d7!2sPudimoe%2C%208581!5e0!3m2!1sen!2sza!4v1776554278433!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    <form action="#" method="post" onsubmit="return validateForm()">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your name..." required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Your email..." required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>
<script>
    // Simple form validation
    function validateForm() {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        if (!name || !email || !message) {
            alert("Please fill in all fields.");
            return false;
        }
        alert("Your message has been sent!");
        return true;
    }
</script>
